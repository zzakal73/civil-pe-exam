<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>토목시공기술사 기출문제 분석 시스템</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --surface: #111827;
  --surface2: #1a2234;
  --surface3: #1f2d45;
  --border: #2a3a52;
  --accent: #3b82f6;
  --accent2: #06b6d4;
  --accent3: #f59e0b;
  --accent4: #10b981;
  --danger: #ef4444;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Noto Sans KR', sans-serif;
  --radius: 10px;
  --shadow: 0 4px 24px rgba(0,0,0,0.5);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* HEADER */
.header {
  background: linear-gradient(135deg, #0d1b35 0%, #0a0e1a 50%, #0d1635 100%);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}
.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}
.logo-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  box-shadow: 0 0 20px rgba(59,130,246,0.4);
}
.logo-text { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
.logo-sub { font-size: 11px; color: var(--text3); font-weight: 400; }
.header-stats {
  display: flex; gap: 20px;
}
.hstat {
  text-align: center;
}
.hstat-num {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 700;
  color: var(--accent2);
  line-height: 1;
}
.hstat-label {
  font-size: 10px;
  color: var(--text3);
  margin-top: 2px;
}

/* NAV TABS */
.nav {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  padding: 0 16px;
  position: sticky;
  top: 73px;
  z-index: 99;
  backdrop-filter: blur(12px);
}
.nav::-webkit-scrollbar { display: none; }
.nav-btn {
  padding: 14px 20px;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  color: var(--text3);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  display: flex; align-items: center; gap: 6px;
}
.nav-btn:hover { color: var(--text); }
.nav-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}
.nav-icon { font-size: 15px; }

/* MAIN LAYOUT */
.main { padding: 20px; max-width: 1400px; margin: 0 auto; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* SEARCH TAB */
.search-sticky {
  position: sticky;
  top: 121px;
  z-index: 98;
  background: var(--bg);
  padding: 14px 0 10px;
  margin-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.search-bar-wrap {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
}
.search-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  font-size: 14px;
  color: var(--text);
  font-family: var(--sans);
  outline: none;
  transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text3); }
.filter-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
  align-items: center;
}
.filter-select {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 12px;
  color: var(--text);
  font-family: var(--sans);
  cursor: pointer;
  outline: none;
}
.filter-select:focus { border-color: var(--accent); }
.filter-btn {
  padding: 8px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text2);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--sans);
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
.result-info {
  font-size: 12px;
  color: var(--text3);
  margin-bottom: 12px;
  font-family: var(--mono);
}
.result-info span { color: var(--accent2); font-weight: 700; }

/* QUESTION CARD */
.q-list { display: flex; flex-direction: column; gap: 8px; }
.q-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.q-card:hover {
  border-color: var(--accent);
  background: var(--surface2);
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(59,130,246,0.15);
}
.q-badge {
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-width: 50px;
}
.badge {
  padding: 3px 8px;
  border-radius: 5px;
  font-size: 10px;
  font-weight: 700;
  font-family: var(--mono);
  text-align: center;
  white-space: nowrap;
}
.badge-term { background: rgba(59,130,246,0.2); color: var(--accent); border: 1px solid rgba(59,130,246,0.3); }
.badge-essay { background: rgba(245,158,11,0.2); color: var(--accent3); border: 1px solid rgba(245,158,11,0.3); }
.badge-hot { background: rgba(239,68,68,0.2); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
.q-main { flex: 1; min-width: 0; }
.q-text {
  font-size: 13.5px;
  font-weight: 500;
  line-height: 1.5;
  color: var(--text);
  margin-bottom: 6px;
}
.q-meta {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}
.q-cat {
  font-size: 11px;
  color: var(--accent2);
  background: rgba(6,182,212,0.1);
  padding: 2px 7px;
  border-radius: 4px;
  border: 1px solid rgba(6,182,212,0.2);
}
.q-section {
  font-size: 11px;
  color: var(--text3);
}
.q-rounds {
  display: flex;
  gap: 3px;
  flex-wrap: wrap;
  margin-top: 6px;
}
.round-chip {
  font-family: var(--mono);
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 4px;
  border: 1px solid;
}
.round-chip.용 { color: #60a5fa; border-color: rgba(96,165,250,0.3); background: rgba(96,165,250,0.08); }
.round-chip.서 { color: #fbbf24; border-color: rgba(251,191,36,0.3); background: rgba(251,191,36,0.08); }
.q-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  min-width: 44px;
}
.total-badge {
  font-family: var(--mono);
  font-size: 20px;
  font-weight: 900;
  line-height: 1;
}
.total-badge.high { color: var(--danger); }
.total-badge.mid { color: var(--accent3); }
.total-badge.low { color: var(--text3); }
.total-label { font-size: 9px; color: var(--text3); }/* MODAL */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  width: 100%;
  max-width: 860px;
  max-height: 88vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 0;
  box-shadow: 0 24px 80px rgba(0,0,0,0.8);
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 0;
  padding: 20px 24px 12px;
  flex-shrink: 0;
}
.modal-title {
  font-size: 16px;
  font-weight: 700;
  line-height: 1.5;
  flex: 1;
  padding-right: 16px;
}
.modal-close {
  width: 32px; height: 32px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  color: var(--text2);
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
}
.modal-close:hover { background: var(--danger); border-color: var(--danger); color: white; }
.modal-stats {
  margin-top: 0;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}
.mstat {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  text-align: center;
}
.mstat-num {
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 900;
  color: var(--accent2);
  line-height: 1;
}
.mstat-label {
  font-size: 10px;
  color: var(--text3);
  margin-top: 4px;
}
.modal-section { margin-bottom: 16px; }
.modal-section-title {
  font-size: 11px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 8px;
  font-family: var(--mono);
}
.timeline {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.tl-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.tl-year {
  font-size: 9px;
  color: var(--text3);
  font-family: var(--mono);
}
.tl-dot {
  width: 28px; height: 28px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px;
  font-weight: 700;
  font-family: var(--mono);
  border: 1px solid;
}
.tl-dot.용 { background: rgba(59,130,246,0.2); color: #60a5fa; border-color: rgba(59,130,246,0.4); }
.tl-dot.서 { background: rgba(245,158,11,0.2); color: #fbbf24; border-color: rgba(245,158,11,0.4); }
/* AD SLOTS */
.ad-slot {
  background: var(--surface2);
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text3);
  font-size: 11px;
  font-family: var(--mono);
  overflow: hidden;
}
.ad-slot-top {
  width: 100%;
  height: 90px;
  margin-bottom: 16px;
}
.ad-slot-side {
  width: 100%;
  height: 250px;
  margin-bottom: 16px;
}
.ad-slot-bottom {
  width: 100%;
  height: 90px;
  margin-top: 16px;
}

/* DASHBOARD TAB */
.dash-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.dash-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
}
.dash-card-title {
  font-size: 12px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 16px;
  font-family: var(--mono);
  display: flex;
  align-items: center;
  gap: 8px;
}
.dash-card-title::before {
  content: '';
  width: 3px;
  height: 14px;
  background: var(--accent);
  border-radius: 2px;
}
.cat-bar-wrap { display: flex; flex-direction: column; gap: 8px; }
.cat-bar-item {
  display: flex;
  align-items: center;
  gap: 8px;
}
.cat-bar-label { font-size: 11px; color: var(--text2); min-width: 100px; }
.cat-bar-track {
  flex: 1;
  height: 8px;
  background: var(--surface3);
  border-radius: 4px;
  overflow: hidden;
}
.cat-bar-fill {
  height: 100%;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width 1s ease;
}
.cat-bar-num {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  min-width: 28px;
  text-align: right;
}
.top-list { display: flex; flex-direction: column; gap: 8px; }
.top-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px;
  background: var(--surface2);
  border-radius: 8px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.2s;
}
.top-item:hover { border-color: var(--accent); }
.top-rank {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 900;
  color: var(--text3);
  min-width: 28px;
}
.top-rank.r1 { color: #fbbf24; }
.top-rank.r2 { color: #94a3b8; }
.top-rank.r3 { color: #b45309; }
.top-q {
  flex: 1;
  font-size: 12px;
  color: var(--text2);
  line-height: 1.4;
}
.top-cnt {
  font-family: var(--mono);
  font-size: 16px;
  font-weight: 700;
  color: var(--danger);
}

/* YEAR HEATMAP */
.year-section { margin-bottom: 24px; }
.year-select-wrap {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.year-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text3);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--mono);
}
.year-btn:hover { border-color: var(--accent2); color: var(--accent2); }
.year-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
.year-result-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.year-result-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.year-result-card:hover {
  border-color: var(--accent2);
  background: var(--surface2);
}
.yr-round {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  margin-bottom: 4px;
}
.yr-q {
  font-size: 12px;
  color: var(--text2);
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.yr-type {
  display: inline-block;
  margin-top: 4px;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 4px;
  font-family: var(--mono);
}
.yr-type.용어 { background: rgba(59,130,246,0.15); color: #60a5fa; }
.yr-type.서술 { background: rgba(245,158,11,0.15); color: #fbbf24; }
.round-btn {
  padding: 7px 16px;
  border-radius: 6px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--mono);
  letter-spacing: -0.3px;
}
.round-btn:hover { border-color: var(--accent2); color: var(--accent2); background: var(--surface2); }
.round-btn.active { background: var(--accent2); border-color: var(--accent2); color: white; box-shadow: 0 2px 8px var(--accent2)40; }

/* PAGINATION */
.pagination {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-top: 20px;
  flex-wrap: wrap;
}
.page-btn {
  width: 34px; height: 34px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text3);
  font-size: 12px;
  cursor: pointer;
  font-family: var(--mono);
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.page-btn:hover { border-color: var(--accent); color: var(--accent); }
.page-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
.page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
}
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-text { font-size: 14px; }

/* RESPONSIVE */
@media (max-width: 640px) {
  .header { padding: 12px 16px; }
  .header-stats { gap: 12px; }
  .hstat-num { font-size: 15px; }
  .nav { top: 65px; }
  .search-sticky { top: 113px; }
  .main { padding: 12px; }
  .modal-stats { grid-template-columns: repeat(2, 1fr); }
  .year-result-grid { grid-template-columns: repeat(2, 1fr); }
  .dash-grid { grid-template-columns: 1fr; }
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }

/* ANSWER TYPE TABS */
.qtype-tabs {
  display: flex; gap: 8px; margin-bottom: 12px;
}
.qtype-btn {
  padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
  border: 1px solid var(--border); background: var(--surface2); color: var(--text3);
  cursor: pointer; font-family: var(--sans); transition: all 0.2s;
  display: flex; align-items: center; gap: 6px;
}
.qtype-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
.qtype-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }
.qtype-badge {
  font-size: 10px; font-weight: 500; opacity: 0.8;
  background: rgba(255,255,255,0.15); border-radius: 4px; padding: 1px 6px;
}

/* MODAL TABS */
.modal-tabs {
  display: flex; gap: 6px; margin-bottom: 0;
  border-bottom: 1px solid var(--border); padding: 0 24px;
  flex-shrink: 0;
}
.modal-tab {
  padding: 8px 20px; font-size: 13px; font-weight: 600;
  border: none; background: none; color: var(--text3);
  cursor: pointer; font-family: var(--sans);
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: all 0.15s;
}
.modal-tab:hover { color: var(--text); }
.modal-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Q-CARD 답안작성 버튼 *//* ANSWER SECTION in modal */
.answer-section {
  margin-top: 20px;
  border-top: 1px solid var(--border);
  padding-top: 16px;
}
.answer-section-title {
  font-size: 11px; color: var(--text3); text-transform: uppercase;
  letter-spacing: 0.8px; margin-bottom: 10px; font-family: var(--mono);
  display: flex; align-items: center; gap: 8px;
}
/* NUMBERING BAR */
.numbering-bar {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  background: #f0f4ff; border: 1px solid #dde4f7; border-radius: 8px;
  padding: 7px 12px; margin-bottom: 6px;
}
.numbering-label {
  font-size: 11px; font-weight: 700; color: #6b7280;
  letter-spacing: 0.5px; margin-right: 4px; white-space: nowrap;
}
.num-dropdown-wrap {
  position: relative;
}
.num-btn {
  padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 600;
  border: 1px solid #c7d2fe; background: #fff; color: #3730a3;
  cursor: pointer; font-family: var(--sans); transition: all 0.15s;
  white-space: nowrap;
}
.num-btn:hover, .num-btn.open { background: #4f46e5; color: #fff; border-color: #4f46e5; }
.num-menu {
  display: none; position: absolute; top: calc(100% + 4px); left: 0;
  background: #fff; border: 1px solid #c7d2fe; border-radius: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15); z-index: 1000;
  padding: 6px; min-width: 220px; flex-wrap: wrap; gap: 4px;
}
.num-menu.open { display: flex; }
.num-item {
  padding: 5px 10px; border-radius: 5px; font-size: 13px; font-weight: 600;
  border: 1px solid #e0e7ff; background: #f5f3ff; color: #3730a3;
  cursor: pointer; font-family: var(--sans); transition: all 0.12s;

function showTab(name, btn) {
  const targetTab = document.getElementById('tab-' + name);
  if (!targetTab) {
    console.warn('존재하지 않는 탭입니다:', name);
    return;
  }

  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  targetTab.classList.add('active');

  // showTab()은 드롭다운·setTimeout·직접 호출에서도 사용되므로
  // 전역 event 객체에 의존하지 않도록 안전하게 활성 버튼을 찾는다.
  let activeBtn = btn || null;
  if (!activeBtn && typeof window !== 'undefined' && window.event && window.event.currentTarget) {
    activeBtn = window.event.currentTarget;
  }
  if (!activeBtn || !activeBtn.classList || !activeBtn.classList.contains('nav-btn')) {
    activeBtn = Array.from(document.querySelectorAll('.nav-btn')).find(b =>
      (b.getAttribute('onclick') || '').includes("showTab('" + name + "'")
    );
  }
  if (activeBtn && activeBtn.classList) activeBtn.classList.add('active');

  if (name === 'yearview') renderYearView();
  if (name === 'hot') renderHot();}

  typeFilter = t;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn' + (t === 'all' ? 'All' : t === 'term' ? 'Term' : 'Essay')).classList.add('active');
  doSearch();
}

function doSearch() {
  const kw = document.getElementById('searchInput').value.trim().toLowerCase();
  const cat = document.getElementById('catFilter').value;
  const sort = document.getElementById('sortFilter').value;
  
  filteredData = DATA.filter(q => {
    if (cat && q.category !== cat) return false;
    if (typeFilter === 'term' && q.term === 0) return false;
    if (typeFilter === 'essay' && q.essay === 0) return false;
    if (kw && !q.question.toLowerCase().includes(kw)) return false;
    return true;
  });
  
  if (sort === 'total') filteredData.sort((a,b) => b.total - a.total);
  else if (sort === 'recent') filteredData.sort((a,b) => {
    const ar = a.appeared.length ? Math.max(...a.appeared.map(x => x.round)) : 0;
    const br = b.appeared.length ? Math.max(...b.appeared.map(x => x.round)) : 0;
    return br - ar;
  });
  else filteredData.sort((a,b) => a.question.localeCompare(b.question));
  
  currentPage = 1;
  renderList();
}

function renderList() {
  const total = filteredData.length;
  const start = (currentPage-1) * PAGE_SIZE;
  const pageData = filteredData.slice(start, start + PAGE_SIZE);
  
  document.getElementById('resultInfo').innerHTML = 
    `검색결과 <span>${total.toLocaleString()}</span>개`;
  
  const container = document.getElementById('qList');
  if (pageData.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">검색 결과가 없습니다</div></div>`;
    document.getElementById('pagination').innerHTML = '';
    return;
  }
  
  container.innerHTML = pageData.map(q => renderCard(q)).join('');
  renderPagination(total);
}

function renderCard(q) {
  const badges = [];
  if (q.term > 0) badges.push(`<span class="badge badge-term">용어×${q.term}</span>`);
  if (q.essay > 0) badges.push(`<span class="badge badge-essay">서술×${q.essay}</span>`);
  if (q.total >= 4) badges.push(`<span class="badge badge-hot">🔥빈출</span>`);
  
  const totClass = q.total >= 4 ? 'high' : q.total >= 2 ? 'mid' : 'low';
  
  const recentRounds = q.appeared.slice(-5).reverse();
  const roundChips = recentRounds.map(a => 
    `<span class="round-chip ${a.type === '용어' ? '용' : '서'}">${a.round}</span>`
  ).join('');
  return `<div class="q-card">
    <div class="q-badge">${badges.join('')}</div>
    <div class="q-main" onclick="openModal(${q.id})">
      <div class="q-text">${q.question}</div>
      <div class="q-meta">
        <span class="q-cat">${CAT_LABEL[q.category] || q.category}</span>
        <span class="q-section">${q.section}</span>
      </div>
      ${q.appeared.length > 0 ? `<div class="q-rounds">${roundChips}</div>` : ''}
    </div>
    <div class="q-right">
      <div class="total-badge ${totClass}">${q.total}</div>
      <div class="total-label">출제횟수</div>
    </div>
  </div>`;
}

function renderPagination(total) {
  const pages = Math.ceil(total / PAGE_SIZE);
  if (pages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
  
  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  
  let start = Math.max(1, currentPage - 2);
  let end = Math.min(pages, start + 4);
  start = Math.max(1, end - 4);
  
  if (start > 1) html += `<button class="page-btn" onclick="goPage(1)">1</button><span style="color:var(--text3);padding:0 4px;">…</span>`;
  for (let p = start; p <= end; p++) {
    html += `<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
  }
  if (end < pages) html += `<span style="color:var(--text3);padding:0 4px;">…</span><button class="page-btn" onclick="goPage(${pages})">${pages}</button>`;
  
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===pages?'disabled':''}>›</button>`;
  document.getElementById('pagination').innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  renderList();
  document.getElementById('tab-search').scrollTop = 0;
  window.scrollTo(0, 0);
}

// ===== MODAL =====
function openModal(id) {
  const q = DATA.find(x => x.id === id);
  if (!q) return;
  currentQ = q;
  
  document.getElementById('modalTitle').textContent = q.question;
  
  const totClass = q.total >= 4 ? 'color:var(--danger)' : q.total >= 2 ? 'color:var(--accent3)' : '';
  document.getElementById('modalStats').innerHTML = `
    <div class="mstat"><div class="mstat-num" style="${totClass}">${q.total}</div><div class="mstat-label">총 출제횟수</div></div>
    <div class="mstat"><div class="mstat-num">${q.term}</div><div class="mstat-label">용어문제</div></div>
    <div class="mstat"><div class="mstat-num">${q.essay}</div><div class="mstat-label">서술문제</div></div>
    <div class="mstat"><div class="mstat-num">${q.appeared.length ? Math.max(...q.appeared.map(x=>x.round)) : '-'}</div><div class="mstat-label">최근 회차</div></div>
  `;
  
  const tlHtml = q.appeared.sort((a,b) => b.round - a.round).map(a => {
    const yr = ROUND_TO_YEAR[a.round] || '';
    return `<div class="tl-item">
      <div class="tl-dot ${a.type === '용어' ? '용' : '서'}">${a.round}</div>
      <div class="tl-year">${yr}</div>
    </div>`;
  }).join('');
  
  document.getElementById('modalTimeline').innerHTML = tlHtml || '<span style="color:var(--text3);font-size:12px;">출제 이력 없음</span>';
  
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  // 저장하지 않은 상태에서 배경 클릭으로 닫히는 것을 방지하기 위해
  // 명시적인 닫기 버튼 호출일 때만 닫습니다.
  if (e) return;
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}


// ===== YEAR VIEW =====
let selectedYear = '2025';

let selectedRound = null;

function renderYearView() {
  const years = Object.keys(YEAR_MAP).sort((a,b) => b-a);
  document.getElementById('yearBtns').innerHTML = years.map(yr =>
    `<button class="year-btn ${yr===selectedYear?'active':''}" onclick="selectYear('${yr}')">${yr}년</button>`
  ).join('');
  renderRoundBtns();
  renderYearResult();
}

function selectYear(yr) {
  selectedYear = yr;
  selectedRound = null;
  document.querySelectorAll('.year-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.startsWith(yr));
  });
  renderRoundBtns();
  renderYearResult();
}

function renderRoundBtns() {
  const rounds = (YEAR_MAP[selectedYear] || []).slice().sort((a,b) => b - a);
  if (!selectedRound || !rounds.includes(selectedRound)) selectedRound = rounds[0] || null;
  document.getElementById('roundBtns').innerHTML = rounds.map(r =>
    `<button class="round-btn ${r===selectedRound?'active':''}" onclick="selectRound(${r})">제${r}회</button>`
  ).join('');
}

function selectRound(r) {
  selectedRound = r;
  document.querySelectorAll('#roundBtns .round-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === `제${r}회`);
  });
  renderYearResult();
}

function renderYearResult() {
  if (!selectedRound) {
    document.getElementById('yearResultInfo').innerHTML = '';
    document.getElementById('yearResultGrid').innerHTML = '';
    return;
  }

  const items = [];
  DATA.forEach(q => {
    q.appeared.forEach(a => {
      if (a.round === selectedRound) items.push({ q, type: a.type });
    });
  });

  const terms  = items.filter(r => r.type === '용어');
  const essays = items.filter(r => r.type === '서술');

  document.getElementById('yearResultInfo').innerHTML =
    `제${selectedRound}회 (${selectedYear}년) — 전체 <span style="color:var(--accent2)">${items.length}</span>문제 &nbsp;|&nbsp; 용어 <span style="color:#60a5fa">${terms.length}</span> &nbsp; 서술 <span style="color:#fbbf24">${essays.length}</span>`;

  function sectionHtml(title, color, list) {
    if (!list.length) return '';
    return `
      <div style="margin-bottom:24px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid ${color}50;">
          <span style="font-size:14px;font-weight:800;color:${color};">${title}</span>
          <span style="font-size:12px;color:var(--text3);">${list.length}문제</span>
        </div>
        ${list.map(r => renderCard(r.q)).join('')}
      </div>`;
  }

  document.getElementById('yearResultGrid').innerHTML =
    sectionHtml('📘 용어', '#60a5fa', terms) +
    sectionHtml('📝 서술', '#fbbf24', essays);
}

// ===== HOT =====
function renderHot() {
  const cat = document.getElementById('hotCatFilter').value;
  const minCnt = parseInt(document.getElementById('hotMinFilter').value);
  
  let data = DATA.filter(q => q.total >= minCnt);
  if (cat) data = data.filter(q => q.category === cat);
  data.sort((a,b) => b.total - a.total);
  
  document.getElementById('hotResultInfo').innerHTML = 
    `빈출 문제 <span style="color:var(--accent2)">${data.length}</span>개`;
  
  document.getElementById('hotList').innerHTML = data.map(q => renderCard(q)).join('');
}

// ===== INIT =====
doSearch();
</script>
